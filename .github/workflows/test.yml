name: test

# MANUAL ONLY. Deliberately NOT triggered on push/PR: the suite is minutes-expensive
# and frequent pushes to `main` would burn runner minutes. Run it on demand from the
# Actions tab (or `gh workflow run test.yml`), or rely on local `pixi run test`.
on:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint + typecheck + fast tests (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          # `locked: true` runs `pixi install --locked`, so any pyproject.toml
          # drift from pixi.lock surfaces as a CI failure (the co-commit invariant).
          locked: true
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Typecheck
        run: pixi run typecheck

      # The default pixi env pulls the ducc0/healpy oracles, so this is the gated
      # parity suite (CPU, float64). The GPU parity gate auto-skips (no device). The
      # heavy off-grid oracle sweeps are marked `slow` and excluded here; run the full
      # suite via full-suite.yml (manual) or `pixi run test` locally / pre-release.
      - name: Test (fast subset -- `not slow`)
        run: pixi run test-fast
